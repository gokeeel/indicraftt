<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body bgcolor="lightgreen">

    <h1 align="center">
        Student Registration Form
    </h1>

    <hr>

    <form>

        <table border="2" cellpadding="10" align="center">

            <tr>
                <td>Student Name</td>

                <td>
                    <input type="text" name="sname">
                </td>
            </tr>

            <tr>
                <td>Father Name</td>

                <td>
                    <input type="text" name="fname">
                </td>
            </tr>

            <tr>
                <td>Gender</td>

                <td>

                    <input type="radio" name="gender">
                    Male

                    <input type="radio" name="gender">
                    Female

                </td>
            </tr>

            <tr>
                <td>Date of Birth</td>

                <td>
                    <input type="date">
                </td>
            </tr>

            <tr>
                <td>Department</td>

                <td>

                    <select>

                        <option>Select Department</option>

                        <option>CSBS</option>

                        <option>CSE</option>

                        <option>IT</option>

                        <option>ECE</option>

                    </select>

                </td>
            </tr>

            <tr>
                <td>Address</td>

                <td>
                    <textarea rows="4" cols="20"></textarea>
                </td>
            </tr>

            <tr>
                <td>Email</td>

                <td>
                    <input type="email">
                </td>
            </tr>

            <tr>
                <td>Phone Number</td>

                <td>
                    <input type="text">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">

                    <input type="submit" value="Register">

                    <input type="reset" value="Clear">

                </td>
            </tr>

        </table>

    </form>

</body>
</html>
