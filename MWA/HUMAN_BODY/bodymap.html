<html>

<head>
    <title>Human Body Image Map</title>
</head>

<body bgcolor="lightyellow">

    <h1 align="center">
        Human Body Parts
    </h1>

    <hr>

    <map name="bodymap">

        <!-- HEAD -->
        <area shape="rect"
              coords="250,120,420,320"
              href="head.html">

        <!-- EYE -->
        <area shape="rect"
              coords="285,190,355,240"
              href="eye.html">

        <!-- NOSE -->
        <area shape="rect"
              coords="300,220,350,270"
              href="nose.html">

        <!-- HAND -->
        <area shape="rect"
              coords="120,500,250,700"
              href="hand.html">

    </map>

    <center>

        <img src="human.jpg"
             usemap="#bodymap"
             width="1400"
             height="1000">

    </center>

    <p align="center">
        Click on body parts to know details
    </p>

</body>

</html>
