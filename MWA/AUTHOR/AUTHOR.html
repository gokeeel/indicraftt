<!DOCTYPE html>
<html>
<head>
    <title>Book Details Form</title>
</head>

<body bgcolor="lightpink">

    <h1 align="center">
        Book Purchase Form
    </h1>

    <hr>

    <form>

        <table border="2" cellpadding="10" align="center">

            <tr>
                <td>Name</td>
                <td>
                    <input type="text" name="name">
                </td>
            </tr>

            <tr>
                <td>Address</td>
                <td>
                    <textarea rows="4" cols="20"></textarea>
                </td>
            </tr>

            <tr>
                <td>Subject of Book</td>
                <td>

                    <input type="radio" name="subject">
                    Computer Science

                    <br>

                    <input type="radio" name="subject">
                    Mathematics

                    <br>

                    <input type="radio" name="subject">
                    Literature

                </td>
            </tr>

            <tr>
                <td>Favorite Author</td>

                <td>
                    <select>

                        <option>Choose Author</option>

                        <option>R.K. HARINI </option>

                        <option>SANJU SAMSON</option>

                        <option>William BUTCHER</option>

                        <option> ARUNTHATHI </option>

                    </select>
                </td>
            </tr>

            <tr>
                <td>Comments on Last Book Read</td>

                <td>
                    <textarea rows="5" cols="25"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">

                    <input type="submit" value="Submit">

                    <input type="reset" value="Reset">

                </td>
            </tr>

        </table>

    </form>

</body>
</html>
